# test プロファイル — H2 インメモリ（テスト専用）
# テスト規約: 各テストクラスに @ActiveProfiles("test")（.claude/rules/testing.md）
spring:
  datasource:
    url: jdbc:h2:mem:attendance_test;DB_CLOSE_DELAY=-1;MODE=LEGACY
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: none
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
